<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AURIX — Acceso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-5);
      background: var(--bg);
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: -30%;
      background:
        radial-gradient(circle 750px at 22% 32%, rgba(79,142,247,.10) 0%, transparent 60%),
        radial-gradient(circle 600px at 80% 74%, rgba(39,199,104,.06) 0%, transparent 60%);
      animation: beta-bg-drift 26s ease-in-out infinite alternate;
      pointer-events: none;
    }

    /* ── Invite section ── */
    .invite-section {
      width: 100%;
      margin-bottom: var(--space-5);
    }

    .invite-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .invite-check {
      flex-shrink: 0;
      width: 18px;
      height: 18px;
      color: var(--green);
      opacity: 0;
      transform: scale(0.6);
      transition: opacity 240ms var(--ease-out), transform 240ms var(--ease-spring);
    }

    .invite-check.visible {
      opacity: 1;
      transform: scale(1);
    }

    /* ── Inputs ── */
    .auth-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: var(--radius-sm);
      padding: 11px 14px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 200ms ease, background 200ms ease;
    }

    .auth-input:focus {
      border-color: rgba(255, 255, 255, 0.22);
      background: rgba(255, 255, 255, 0.06);
    }

    .auth-input::placeholder { color: var(--text-dim); }
    .auth-input:disabled     { opacity: 0.35; }

    /* ── Auth section (locked/unlocked) ── */
    .auth-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .locked {
      opacity: 0.4;
      filter: blur(4px);
      transform: translateY(10px);
      pointer-events: none;
      transition: opacity 0.3s ease, filter 0.3s ease, transform 0.3s ease;
    }

    .unlocked {
      opacity: 1;
      filter: blur(0);
      transform: translateY(0);
      pointer-events: auto;
      transition: opacity 0.3s ease, filter 0.3s ease, transform 0.3s ease;
    }

    /* ── Auth title ── */
    #auth-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-bright);
      letter-spacing: -0.01em;
      margin-bottom: 2px;
    }

    /* ── Submit button ── */
    .auth-btn {
      width: 100%;
      margin-top: 2px;
      padding: 12px;
      border-radius: var(--radius-sm);
      border: 1px solid rgba(79, 142, 247, 0.25);
      background: rgba(79, 142, 247, 0.14);
      color: #7fb8ff;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: opacity 160ms ease, transform 120ms ease;
    }

    .auth-btn:hover:not(:disabled) { opacity: 0.82; }
    .auth-btn:active:not(:disabled) { transform: scale(0.97); }
    .auth-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Switch link ── */
    .auth-switch {
      cursor: pointer;
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      letter-spacing: 0.01em;
      transition: color 160ms ease;
      margin-top: 2px;
    }

    .auth-switch:hover { color: var(--text); }

    /* ── Error / feedback message ── */
    .auth-error {
      font-size: 12px;
      text-align: center;
      min-height: 16px;
      letter-spacing: 0.01em;
    }
  </style>
</head>
<body>

  <div class="beta-container">

    <div class="beta-logo-above">
      <span class="logo-aurix">AURIX</span>
    </div>

    <div class="beta-card">
      <div class="beta-access-label">Acceso privado</div>
      <p class="beta-hint">Introduce tu código de invitación</p>

      <!-- Invite gate -->
      <div class="invite-section">
        <div class="invite-row">
          <input id="inviteCode" class="auth-input" type="text"
                 placeholder="Código de invitación"
                 autocomplete="off" spellcheck="false">
          <svg id="inviteCheck" class="invite-check" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
            <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
          </svg>
        </div>
      </div>

      <!-- Auth form (locked until invite) -->
      <div id="authSection" class="auth-section locked">
        <h2 id="auth-title">Iniciar sesión</h2>
        <input id="email" type="email" class="auth-input"
               placeholder="correo electrónico"
               autocomplete="email" disabled>
        <input id="password" type="password" class="auth-input"
               placeholder="contraseña"
               autocomplete="current-password" disabled>
        <button id="auth-submit" class="auth-btn" disabled>Entrar</button>
        <p id="auth-switch" class="auth-switch"></p>
        <p id="auth-error" class="auth-error"></p>
      </div>

      <p class="beta-version">Private Beta &bull; v0.1</p>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script>
    'use strict';

    // ── Supabase client ────────────────────────────────────────
    let client = null;
    if (typeof SUPABASE_URL !== 'undefined' && typeof SUPABASE_ANON_KEY !== 'undefined' && window.supabase) {
      client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    }

    // Redirect if already authenticated
    if (client) {
      client.auth.getSession().then(({ data: { session } }) => {
        if (session?.user) window.location.href = 'index.html';
      });
    }

    // ── Auth functions ─────────────────────────────────────────
    async function signIn(email, password) {
      return client.auth.signInWithPassword({ email, password });
    }

    async function signUp(email, password) {
      return client.auth.signUp({ email, password });
    }

    // ── State ──────────────────────────────────────────────────
    let authMode       = 'login';
    let inviteUnlocked = false;

    // ── DOM refs ───────────────────────────────────────────────
    const VALID_CODE  = 'AURIX123';
    const inviteInput = document.getElementById('inviteCode');
    const authSection = document.getElementById('authSection');
    const inviteCheck = document.getElementById('inviteCheck');
    const emailEl     = document.getElementById('email');
    const passwordEl  = document.getElementById('password');
    const submitBtn   = document.getElementById('auth-submit');
    const errorEl     = document.getElementById('auth-error');

    // ── Invite gate ────────────────────────────────────────────
    inviteInput.addEventListener('input', () => {
      if (inviteInput.value.trim().toUpperCase() === VALID_CODE) {
        unlockAuth();
      }
    });

    function updateInviteState(unlocked) {
      inviteUnlocked      = unlocked;
      emailEl.disabled    = !unlocked;
      passwordEl.disabled = !unlocked;
      submitBtn.disabled  = !unlocked;
    }

    function unlockAuth() {
      authSection.classList.remove('locked');
      authSection.classList.add('unlocked');
      updateInviteState(true);
      inviteCheck.classList.add('visible');
      emailEl.focus();
    }

    // ── Auth mode toggle ───────────────────────────────────────
    function setAuthMode(mode) {
      authMode = mode;
      const title      = document.getElementById('auth-title');
      const switchLink = document.getElementById('auth-switch');
      if (mode === 'login') {
        title.innerText      = 'Iniciar sesión';
        submitBtn.innerText  = 'Entrar';
        switchLink.innerText = '¿No tienes cuenta? Crear cuenta';
      } else {
        title.innerText      = 'Crear cuenta';
        submitBtn.innerText  = 'Crear cuenta';
        switchLink.innerText = '¿Ya tienes cuenta? Iniciar sesión';
      }
      errorEl.innerText  = '';
      errorEl.style.color = '';
    }

    document.getElementById('auth-switch').onclick = () => {
      setAuthMode(authMode === 'login' ? 'signup' : 'login');
    };

    // ── Error handling ─────────────────────────────────────────
    function handleAuthError(error) {
      const msg = error.message || '';
      errorEl.style.color = 'var(--red)';
      if (msg.includes('rate limit')) {
        errorEl.innerText = 'Demasiados intentos. Espera un momento.';
      } else if (msg.includes('Invalid login') || msg.includes('Invalid email or password')) {
        errorEl.innerText = 'Email o contraseña incorrectos.';
      } else {
        errorEl.innerText = 'Ha ocurrido un error. Inténtalo de nuevo.';
      }
    }

    // ── Submit ─────────────────────────────────────────────────
    submitBtn.onclick = async () => {
      if (!inviteUnlocked) return;
      if (!client) {
        errorEl.style.color = 'var(--red)';
        errorEl.innerText   = 'Supabase no disponible.';
        return;
      }

      errorEl.innerText       = '';
      submitBtn.disabled      = true;
      submitBtn.innerText     = authMode === 'login' ? 'Entrando…' : 'Creando cuenta…';

      const res = await (authMode === 'login'
        ? signIn(emailEl.value.trim(), passwordEl.value)
        : signUp(emailEl.value.trim(), passwordEl.value));

      if (res?.error) {
        handleAuthError(res.error);
        submitBtn.disabled  = false;
        submitBtn.innerText = authMode === 'login' ? 'Entrar' : 'Crear cuenta';
      } else if (authMode === 'login') {
        window.location.href = 'index.html';
      } else {
        errorEl.style.color = 'var(--green)';
        errorEl.innerText   = 'Cuenta creada — revisa tu email para confirmar.';
        submitBtn.disabled  = false;
        submitBtn.innerText = 'Crear cuenta';
      }
    };

    passwordEl.addEventListener('keydown', e => {
      if (e.key === 'Enter') submitBtn.click();
    });

    // ── Init ───────────────────────────────────────────────────
    updateInviteState(false);
    setAuthMode('login');
  </script>

</body>
</html>
