<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <base href="/Aurix/">
  <title>AURIX — Acceso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-5);
      background: var(--bg);
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: -30%;
      background:
        radial-gradient(circle 750px at 22% 32%, rgba(79,142,247,.10) 0%, transparent 60%),
        radial-gradient(circle 600px at 80% 74%, rgba(39,199,104,.06) 0%, transparent 60%);
      animation: beta-bg-drift 26s ease-in-out infinite alternate;
      pointer-events: none;
    }

    /* ── Invite section ── */
    .invite-section {
      width: 100%;
      margin-bottom: var(--space-5);
    }

    .invite-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .invite-check {
      flex-shrink: 0;
      width: 18px;
      height: 18px;
      color: var(--green);
      opacity: 0;
      transform: scale(0.6);
      transition: opacity 240ms var(--ease-out), transform 240ms var(--ease-spring);
    }

    .invite-check.visible {
      opacity: 1;
      transform: scale(1);
    }

    /* ── Inputs ── */
    .auth-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: var(--radius-sm);
      padding: 11px 14px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 200ms ease, background 200ms ease;
    }

    .auth-input:focus {
      border-color: rgba(255, 255, 255, 0.22);
      background: rgba(255, 255, 255, 0.06);
    }

    .auth-input::placeholder { color: var(--text-dim); }
    .auth-input:disabled     { opacity: 0.35; }

    /* ── Auth section (locked/unlocked) ── */
    .auth-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .locked {
      opacity: 0.4;
      filter: blur(4px);
      transform: translateY(10px);
      pointer-events: none;
      transition: opacity 0.3s ease, filter 0.3s ease, transform 0.3s ease;
    }

    .unlocked {
      opacity: 1;
      filter: blur(0);
      transform: translateY(0);
      pointer-events: auto;
      transition: opacity 0.3s ease, filter 0.3s ease, transform 0.3s ease;
    }

    /* ── Auth title ── */
    #auth-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-bright);
      letter-spacing: -0.01em;
      margin-bottom: 2px;
    }

    /* ── Submit button ── */
    .auth-btn {
      width: 100%;
      margin-top: 2px;
      padding: 12px;
      border-radius: var(--radius-sm);
      border: 1px solid rgba(79, 142, 247, 0.25);
      background: rgba(79, 142, 247, 0.14);
      color: #7fb8ff;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: opacity 160ms ease, transform 120ms ease;
    }

    .auth-btn:hover:not(:disabled) { opacity: 0.82; }
    .auth-btn:active:not(:disabled) { transform: scale(0.97); }
    .auth-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Feedback message ── */
    .auth-error {
      font-size: 12px;
      text-align: center;
      min-height: 16px;
      letter-spacing: 0.01em;
    }

    /* ── Secondary links ── */
    .auth-link {
      cursor: pointer;
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      letter-spacing: 0.01em;
      transition: color 160ms ease;
      margin-top: 2px;
    }

    .auth-link:hover { color: var(--text); }
  </style>
</head>
<body>

  <div class="beta-container">

    <div class="beta-logo-above">
      <span class="logo-aurix">AURIX</span>
    </div>

    <div class="beta-card">
      <div class="beta-access-label">Acceso privado</div>
      <p class="beta-hint">Introduce tu código de invitación</p>

      <!-- Invite gate -->
      <div class="invite-section">
        <div class="invite-row">
          <input id="inviteCode" class="auth-input" type="text"
                 placeholder="Código de invitación"
                 autocomplete="off" spellcheck="false">
          <svg id="inviteCheck" class="invite-check" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
            <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
          </svg>
        </div>
      </div>

      <!-- Auth form (locked until invite) -->
      <div id="authSection" class="auth-section locked">
        <h2 id="auth-title">Iniciar sesión</h2>
        <input id="email" type="email" class="auth-input"
               placeholder="correo electrónico"
               autocomplete="email" disabled>
        <button id="auth-submit" class="auth-btn" disabled>Enviar enlace</button>
        <p id="auth-error" class="auth-error"></p>
        <p id="forgot-link" class="auth-link">¿Olvidaste tu contraseña?</p>
        <p id="back-link" class="auth-link" style="display:none">← Volver al inicio de sesión</p>
      </div>

      <p class="beta-version">Private Beta &bull; v0.1</p>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script>
    'use strict';

    // ── Supabase client ────────────────────────────────────────
    let client = null;
    if (typeof SUPABASE_URL !== 'undefined' && typeof SUPABASE_ANON_KEY !== 'undefined' && window.supabase) {
      client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    }

    function safeRedirect(path) {
      const base = 'https://rbn888.github.io/Aurix/';
      window.location.href = base + path;
    }

    // Redirect if already authenticated
    (async () => {
      if (!client) return;
      const { data: { user } } = await client.auth.getUser();
      if (user) safeRedirect('index.html');
    })();

    // ── DOM refs ───────────────────────────────────────────────
    const inviteInput = document.getElementById('inviteCode');
    const authSection = document.getElementById('authSection');
    const inviteCheck = document.getElementById('inviteCheck');
    const emailEl     = document.getElementById('email');
    const submitBtn   = document.getElementById('auth-submit');
    const errorEl     = document.getElementById('auth-error');
    const forgotLink  = document.getElementById('forgot-link');
    const backLink    = document.getElementById('back-link');

    // ── Invite gate ────────────────────────────────────────────
    async function validateInvite(code) {
      if (!client || !code) return { valid: false };
      try {
        const { data, error } = await client
          .from('invite_codes')
          .select('*')
          .eq('code', code)
          .single();
        if (error || !data)                   return { valid: false };
        if (!data.active)                     return { valid: false };
        if (data.used_count >= data.max_uses) return { valid: false };
        return { valid: true, invite: data };
      } catch {
        return { valid: false };
      }
    }

    inviteInput.addEventListener('input', async () => {
      const code = inviteInput.value.trim().toUpperCase();
      if (!code) return;
      const result = await validateInvite(code);
      if (result.valid) {
        unlockAuth();
      } else {
        lockAuth();
      }
    });

    // ── Mode (login | reset) ───────────────────────────────────
    let mode = 'login';

    function setMode(m) {
      mode = m;
      errorEl.innerText = '';
      if (m === 'reset') {
        document.getElementById('auth-title').innerText = 'Restablecer contraseña';
        forgotLink.style.display = 'none';
        backLink.style.display   = 'block';
      } else {
        document.getElementById('auth-title').innerText = 'Iniciar sesión';
        forgotLink.style.display = 'block';
        backLink.style.display   = 'none';
      }
    }

    forgotLink.addEventListener('click', () => setMode('reset'));
    backLink.addEventListener('click',   () => setMode('login'));

    function lockAuth() {
      emailEl.disabled    = true;
      submitBtn.disabled  = true;
      authSection.classList.remove('unlocked');
      authSection.classList.add('locked');
      inviteCheck.classList.remove('visible');
      setMode('login');
    }

    function unlockAuth() {
      emailEl.disabled    = false;
      submitBtn.disabled  = false;
      authSection.classList.remove('locked');
      authSection.classList.add('unlocked');
      inviteCheck.classList.add('visible');
      emailEl.focus();
    }

    // ---------- INIT ----------

    // Prefill email
    const savedEmail = localStorage.getItem('last_email');
    if (savedEmail) emailEl.value = savedEmail;

    // Enter → submit (solo en email, no global)
    emailEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') submitBtn.click();
    });

    // Estado inicial
    lockAuth();


    // ---------- HANDLER ----------

    let cooldown = false;
    let waitDuration = 90; // increases on repeated rate limits, max 180

    function startCooldown(seconds) {
      cooldown = true;
      submitBtn.disabled = true;
      errorEl.style.color = 'orange';

      let wait = seconds;
      errorEl.innerText = `Demasiados intentos. Espera ${wait}s`;

      const interval = setInterval(() => {
        wait--;
        errorEl.innerText = `Demasiados intentos. Espera ${wait}s`;

        if (wait <= 0) {
          clearInterval(interval);
          cooldown = false;
          submitBtn.disabled = false;
          errorEl.innerText = '';
          errorEl.style.color = 'var(--red)';
          localStorage.removeItem('cooldown_until');
        }
      }, 1000);
    }

    submitBtn.addEventListener('click', async () => {

      // Anti double submit + rate-limit cooldown
      if (submitBtn.disabled || cooldown) return;

      const email = emailEl.value.trim();

      // Validación básica UX
      if (!email || !email.includes('@')) {
        errorEl.style.color = 'var(--red)';
        errorEl.innerText = 'Introduce un email válido';
        return;
      }

      // Reset UI
      errorEl.innerText = '';
      errorEl.style.color = 'var(--red)';

      // Loading UX
      submitBtn.disabled = true;
      submitBtn.innerText = 'Enviando enlace...';

      try {
        if (mode === 'reset') {
          const { error } = await client.auth.resetPasswordForEmail(email, {
            redirectTo: 'https://rbn888.github.io/Aurix/reset-password.html'
          });
          if (error) throw error;

          waitDuration = 90;
          submitBtn.innerText = 'Revisa tu email ✉️';
          errorEl.style.color = 'var(--green)';
          errorEl.innerText   = 'Te hemos enviado un enlace para restablecer tu contraseña';

        } else {
          const { error } = await client.auth.signInWithOtp({
            email,
            options: { emailRedirectTo: 'https://rbn888.github.io/Aurix/' }
          });
          if (error) throw error;

          waitDuration = 90;
          localStorage.setItem('last_email', email);
          sessionStorage.setItem('otp_sent', '1');

          submitBtn.innerText = 'Revisa tu email ✉️';
          errorEl.style.color = 'var(--green)';
          errorEl.innerText   = 'Te hemos enviado un enlace de acceso';
        }

      } catch (err) {
        const msg = err?.message || '';

        if (msg.toLowerCase().includes('rate')) {
          localStorage.setItem('cooldown_until', Date.now() + waitDuration * 1000);
          startCooldown(waitDuration);
          waitDuration = Math.min(waitDuration + 30, 180);
          submitBtn.innerText = 'Enviar enlace';
        } else {
          errorEl.style.color = 'var(--red)';
          errorEl.innerText = 'Ha ocurrido un error. Inténtalo de nuevo.';
          submitBtn.disabled  = false;
          submitBtn.innerText = 'Enviar enlace';
        }
      }
    });


    // ---------- UX RESTORE (post refresh) ----------

    // Resume cooldown if page was refreshed mid-countdown
    const _until = parseInt(localStorage.getItem('cooldown_until') || '0', 10);
    if (_until && Date.now() < _until) {
      startCooldown(Math.ceil((_until - Date.now()) / 1000));
    }

    if (sessionStorage.getItem('otp_sent')) {
      submitBtn.innerText = 'Revisa tu email ✉️';
      errorEl.style.color = 'var(--green)';
      errorEl.innerText = 'Te hemos enviado un enlace de acceso';

      // Permitir reintento tras unos segundos (UX pro)
      setTimeout(() => {
        submitBtn.disabled = false;
        submitBtn.innerText = 'Reenviar enlace';
      }, 5000);
    }
  </script>

</body>
</html>
