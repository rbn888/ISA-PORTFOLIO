<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <base href="/Aurix/">
  <title>AURIX — Acceso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-5);
      background: var(--bg);
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: -30%;
      background:
        radial-gradient(circle 750px at 22% 32%, rgba(79,142,247,.10) 0%, transparent 60%),
        radial-gradient(circle 600px at 80% 74%, rgba(39,199,104,.06) 0%, transparent 60%);
      animation: beta-bg-drift 26s ease-in-out infinite alternate;
      pointer-events: none;
    }

    /* ── Invite section ── */
    .invite-section {
      width: 100%;
      margin-bottom: var(--space-5);
    }

    .invite-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .invite-check {
      flex-shrink: 0;
      width: 18px;
      height: 18px;
      color: var(--green);
      opacity: 0;
      transform: scale(0.6);
      transition: opacity 240ms var(--ease-out), transform 240ms var(--ease-spring);
    }

    .invite-check.visible {
      opacity: 1;
      transform: scale(1);
    }

    /* ── Inputs ── */
    .auth-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: var(--radius-sm);
      padding: 11px 14px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 200ms ease, background 200ms ease;
    }

    .auth-input:focus {
      border-color: rgba(255, 255, 255, 0.22);
      background: rgba(255, 255, 255, 0.06);
    }

    .auth-input::placeholder { color: var(--text-dim); }
    .auth-input:disabled     { opacity: 0.35; }

    /* ── Auth section (locked/unlocked) ── */
    .auth-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .locked {
      opacity: 0.4;
      filter: blur(4px);
      transform: translateY(10px);
      pointer-events: none;
      transition: opacity 0.3s ease, filter 0.3s ease, transform 0.3s ease;
    }

    .unlocked {
      opacity: 1;
      filter: blur(0);
      transform: translateY(0);
      pointer-events: auto;
      transition: opacity 0.3s ease, filter 0.3s ease, transform 0.3s ease;
    }

    /* ── Auth title ── */
    #auth-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-bright);
      letter-spacing: -0.01em;
      margin-bottom: 2px;
    }

    /* ── Submit button ── */
    .auth-btn {
      width: 100%;
      margin-top: 2px;
      padding: 12px;
      border-radius: var(--radius-sm);
      border: 1px solid rgba(79, 142, 247, 0.25);
      background: rgba(79, 142, 247, 0.14);
      color: #7fb8ff;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: opacity 160ms ease, transform 120ms ease;
    }

    .auth-btn:hover:not(:disabled) { opacity: 0.82; }
    .auth-btn:active:not(:disabled) { transform: scale(0.97); }
    .auth-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Feedback message ── */
    .auth-error {
      font-size: 12px;
      text-align: center;
      min-height: 16px;
      letter-spacing: 0.01em;
    }

    /* ── Secondary links ── */
    .auth-link {
      cursor: pointer;
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      letter-spacing: 0.01em;
      transition: color 160ms ease;
      margin-top: 2px;
    }

    .auth-link:hover { color: var(--text); }
  </style>
</head>
<body>

  <div class="beta-container">

    <div class="beta-logo-above">
      <span class="logo-aurix">AURIX</span>
    </div>

    <div class="beta-card">
      <div class="beta-access-label">Acceso privado</div>
      <p class="beta-hint">Introduce tu código de invitación</p>

      <!-- Invite gate -->
      <div class="invite-section">
        <div class="invite-row">
          <input id="inviteCode" class="auth-input" type="text"
                 placeholder="Código de invitación"
                 autocomplete="off" spellcheck="false">
          <svg id="inviteCheck" class="invite-check" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
            <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
          </svg>
        </div>
      </div>

      <!-- Auth form (locked until invite) -->
      <div id="authSection" class="auth-section locked">
        <h2 id="auth-title">Acceder</h2>
        <input id="email" type="email" class="auth-input"
               placeholder="correo electrónico"
               autocomplete="email" disabled>
        <button id="auth-submit" class="auth-btn" disabled>Enviar acceso</button>
        <p id="auth-error" class="auth-error"></p>
      </div>

      <p class="beta-version">Private Beta &bull; v0.1</p>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script>
    'use strict';

    // ── Supabase client ────────────────────────────────────────
    let client = null;
    if (typeof SUPABASE_URL !== 'undefined' && typeof SUPABASE_ANON_KEY !== 'undefined' && window.supabase) {
      client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    }

    function safeRedirect(path) {
      const base = 'https://rbn888.github.io/Aurix/';
      window.location.href = base + path;
    }

    if (client) {
      // Fast redirect if session already exists
      client.auth.getSession().then(({ data: { session } }) => {
        if (session) safeRedirect('index.html');
      });

      // Catch SIGNED_IN in case a magic link exchange completes while on this page
      client.auth.onAuthStateChange((event, session) => {
        if (event === 'SIGNED_IN' && session) safeRedirect('index.html');
      });
    }

    // ── DOM refs ───────────────────────────────────────────────
    const inviteInput = document.getElementById('inviteCode');
    const authSection = document.getElementById('authSection');
    const inviteCheck = document.getElementById('inviteCheck');
    const emailEl     = document.getElementById('email');
    const submitBtn   = document.getElementById('auth-submit');
    const errorEl     = document.getElementById('auth-error');

    // ── Invite gate ────────────────────────────────────────────
    async function validateInvite(code) {
      if (!client || !code) return { valid: false };
      try {
        const { data, error } = await client
          .from('invite_codes')
          .select('*')
          .eq('code', code)
          .single();
        if (error || !data)                   return { valid: false };
        if (!data.active)                     return { valid: false };
        if (data.used_count >= data.max_uses) return { valid: false };
        return { valid: true, invite: data };
      } catch {
        return { valid: false };
      }
    }

    inviteInput.addEventListener('input', async () => {
      const code = inviteInput.value.trim().toUpperCase();
      if (!code) return;
      const result = await validateInvite(code);
      if (result.valid) {
        unlockAuth();
      } else {
        lockAuth();
      }
    });

    // ── Shared state (declared here so lockAuth/unlockAuth can read cooldown) ──
    let authUnlocked = false;
    let cooldown     = false;
    let rateLimitHits    = 0;
    let _cooldownTimer   = null;

    function lockAuth() {
      authUnlocked = false;
      emailEl.disabled   = true;
      submitBtn.disabled = true;
      authSection.classList.remove('unlocked');
      authSection.classList.add('locked');
      inviteCheck.classList.remove('visible');
    }

    function unlockAuth() {
      authUnlocked = true;
      emailEl.disabled = false;
      // Only enable submit if cooldown is not active
      if (!cooldown) submitBtn.disabled = false;
      authSection.classList.remove('locked');
      authSection.classList.add('unlocked');
      inviteCheck.classList.add('visible');
      emailEl.focus();
    }

    // ---------- INIT ----------

    const savedEmail = localStorage.getItem('last_email');
    if (savedEmail) emailEl.value = savedEmail;

    emailEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') submitBtn.click();
    });

    lockAuth();


    // ---------- HANDLER ----------

    function clearTimer() {
      if (_cooldownTimer !== null) {
        clearInterval(_cooldownTimer);
        _cooldownTimer = null;
      }
    }

    // Full reset: state + storage + UI (only re-enables button if invite gate is open)
    function resetCooldownState() {
      clearTimer();
      cooldown = false;
      rateLimitHits = 0;
      localStorage.removeItem('cooldown_until');
      errorEl.innerText = '';
      errorEl.style.color = 'var(--red)';
      if (authUnlocked) {
        submitBtn.disabled = false;
        submitBtn.innerText = 'Enviar acceso';
      }
    }

    // until = absolute timestamp (ms) — always anchored to real time, iOS-safe
    function startCooldown(until) {
      clearTimer();
      cooldown = true;
      submitBtn.disabled = true;
      errorEl.style.color = 'orange';

      const tick = () => {
        const remaining = Math.ceil((until - Date.now()) / 1000);
        if (remaining <= 0) {
          resetCooldownState();
          return;
        }
        errorEl.innerText = `Demasiados intentos. Espera ${remaining}s`;
      };

      tick(); // render immediately, don't wait first second
      _cooldownTimer = setInterval(tick, 1000);
    }

    function handleSuccess(message) {
      resetCooldownState();
      // Always re-enable after a successful send (auth section is open at this point)
      submitBtn.disabled = false;
      submitBtn.innerText = 'Enviar acceso';
      errorEl.style.color = 'var(--green)';
      errorEl.innerText = message;
    }

    function handleRateLimit() {
      rateLimitHits++;
      const waitDuration = Math.min(90 + (rateLimitHits - 1) * 30, 180);
      const until = Date.now() + waitDuration * 1000;
      localStorage.setItem('cooldown_until', until);
      startCooldown(until);
    }

    function handleError(err) {
      const msg = (err?.message || '').toLowerCase();
      const isRateLimit = msg.includes('rate') || msg.includes('too many') ||
                          msg.includes('over') || msg.includes('limit');
      if (isRateLimit) {
        handleRateLimit();
        return;
      }
      errorEl.style.color = 'var(--red)';
      errorEl.innerText = 'Ha ocurrido un error. Inténtalo de nuevo.';
      if (!cooldown) {
        submitBtn.disabled = false;
        submitBtn.innerText = 'Enviar acceso';
      }
    }

    submitBtn.addEventListener('click', async () => {
      if (submitBtn.disabled) return;

      // Self-heal: in-memory flag may be stale after tab sleep / device suspend
      if (cooldown) {
        const storedUntil = Number(localStorage.getItem('cooldown_until') || 0);
        if (storedUntil <= Date.now()) {
          resetCooldownState();
        } else {
          return;
        }
      }

      const email = emailEl.value.trim();
      if (!email || !email.includes('@')) {
        errorEl.style.color = 'var(--red)';
        errorEl.innerText = 'Introduce un email válido';
        return;
      }

      errorEl.innerText = '';
      errorEl.style.color = 'var(--red)';
      submitBtn.disabled = true;
      submitBtn.innerText = 'Enviando acceso...';

      const { error } = await client.auth.signInWithOtp({
        email,
        options: { emailRedirectTo: 'https://rbn888.github.io/Aurix/index.html' }
      });
      if (error) { handleError(error); return; }
      localStorage.setItem('last_email', email);
      sessionStorage.setItem('otp_sent', '1');
      handleSuccess('Te hemos enviado un enlace de acceso.');
    });


    // ---------- UX RESTORE (post refresh) ----------

    const storedUntil = Number(localStorage.getItem('cooldown_until') || 0);
    if (storedUntil > Date.now()) {
      startCooldown(storedUntil); // rebuild from stored timestamp — exact, no drift
    } else {
      localStorage.removeItem('cooldown_until'); // hard reset: prevent stuck state
      cooldown = false;
      rateLimitHits = 0;
    }

    if (sessionStorage.getItem('otp_sent') && !cooldown) {
      submitBtn.innerText = 'Revisa tu email ✉️';
      errorEl.style.color = 'var(--green)';
      errorEl.innerText = 'Te hemos enviado un enlace de acceso';

      setTimeout(() => {
        if (!cooldown && authUnlocked) {
          submitBtn.disabled = false;
          submitBtn.innerText = 'Reenviar acceso';
        }
      }, 5000);
    }
  </script>

</body>
</html>
