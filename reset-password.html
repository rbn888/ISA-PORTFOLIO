<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AURIX — Nueva contraseña</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-5);
      background: var(--bg);
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: -30%;
      background:
        radial-gradient(circle 750px at 22% 32%, rgba(79,142,247,.10) 0%, transparent 60%),
        radial-gradient(circle 600px at 80% 74%, rgba(39,199,104,.06) 0%, transparent 60%);
      animation: beta-bg-drift 26s ease-in-out infinite alternate;
      pointer-events: none;
    }

    .auth-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: var(--radius-sm);
      padding: 11px 14px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 200ms ease, background 200ms ease;
    }

    .auth-input:focus {
      border-color: rgba(255, 255, 255, 0.22);
      background: rgba(255, 255, 255, 0.06);
    }

    .auth-input::placeholder { color: var(--text-dim); }
    .auth-input:disabled     { opacity: 0.35; }

    .auth-btn {
      width: 100%;
      margin-top: 2px;
      padding: 12px;
      border-radius: var(--radius-sm);
      border: 1px solid rgba(79, 142, 247, 0.25);
      background: rgba(79, 142, 247, 0.14);
      color: #7fb8ff;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: opacity 160ms ease, transform 120ms ease;
    }

    .auth-btn:hover:not(:disabled) { opacity: 0.82; }
    .auth-btn:active:not(:disabled) { transform: scale(0.97); }
    .auth-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .auth-form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #auth-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-bright);
      letter-spacing: -0.01em;
      margin-bottom: 2px;
    }

    .auth-message {
      font-size: 12px;
      text-align: center;
      min-height: 16px;
      letter-spacing: 0.01em;
    }

    .auth-link {
      cursor: pointer;
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      letter-spacing: 0.01em;
      transition: color 160ms ease;
      margin-top: 2px;
    }

    .auth-link:hover { color: var(--text); }
  </style>
</head>
<body>

  <div class="beta-container">

    <div class="beta-logo-above">
      <span class="logo-aurix">AURIX</span>
    </div>

    <div class="beta-card">
      <div class="beta-access-label">Nueva contraseña</div>
      <p class="beta-hint">Elige una contraseña segura</p>

      <div id="authForm" class="auth-form" style="display:none">
        <h2 id="auth-title">Establecer contraseña</h2>
        <input id="password" type="password" class="auth-input"
               placeholder="Nueva contraseña (mín. 6 caracteres)"
               autocomplete="new-password">
        <button id="submitBtn" class="auth-btn">Actualizar contraseña</button>
        <p id="message" class="auth-message"></p>
        <p class="auth-link" onclick="window.location.href='login.html'">
          Volver al inicio de sesión
        </p>
      </div>

      <div id="invalidState" style="display:none">
        <p class="auth-message" style="color:var(--red); text-align:center">
          Link inválido o expirado
        </p>
        <p class="auth-link" style="margin-top:12px" onclick="window.location.href='login.html'">
          Volver al inicio de sesión
        </p>
      </div>

      <p class="beta-version">Private Beta &bull; v0.1</p>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script>
    'use strict';

    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const formEl    = document.getElementById('authForm');
    const invalidEl = document.getElementById('invalidState');
    const passwordEl = document.getElementById('password');
    const submitBtn  = document.getElementById('submitBtn');
    const messageEl  = document.getElementById('message');

    function setMsg(text, type) {
      messageEl.textContent = text;
      messageEl.style.color = type === 'error'
        ? 'var(--red)'
        : type === 'success'
          ? 'var(--green)'
          : 'var(--text-muted)';
    }

    // Check session on load
    (async () => {
      const { data: { session } } = await client.auth.getSession();
      if (!session) {
        invalidEl.style.display = 'block';
        return;
      }
      formEl.style.display = 'flex';
      passwordEl.focus();
    })();

    // Submit
    submitBtn.addEventListener('click', async () => {
      if (submitBtn.disabled) return;

      const password = passwordEl.value;

      if (!password || password.length < 6) {
        setMsg('La contraseña debe tener al menos 6 caracteres.', 'error');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Actualizando...';
      setMsg('', '');

      const { error } = await client.auth.updateUser({ password });

      if (error) {
        setMsg(error.message || 'Ha ocurrido un error. Inténtalo de nuevo.', 'error');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Actualizar contraseña';
        return;
      }

      setMsg('Contraseña actualizada correctamente.', 'success');
      submitBtn.textContent = '¡Listo!';
      setTimeout(() => { window.location.href = 'login.html'; }, 1500);
    });

    passwordEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !submitBtn.disabled) submitBtn.click();
    });
  </script>

</body>
</html>
